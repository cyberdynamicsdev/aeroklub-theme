<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800;900&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body { font-family: 'IBM Plex Sans', system-ui, sans-serif; color: #1a2233; background: #fff; -webkit-font-smoothing: antialiased; }
  a { text-decoration: none; color: inherit; }
  ::selection { background: #f3c200; color: #0e1f42; }
  .article-body p { margin: 0 0 20px; }
  .article-body h2 { font-family: 'Archivo', sans-serif; font-weight: 800; font-size: 24px; color: #0e1f42; margin: 40px 0 16px; }
  .article-body ul { margin: 0 0 20px; padding-left: 22px; }
  .article-body li { margin-bottom: 8px; }
</style>
</helmet>

<div style="width:100%;overflow-x:hidden;font-family:'IBM Plex Sans',sans-serif;line-height:1.5;">
  <dc-import name="MikrolotyNav" active="aktualnosci" hint-size="100%,112px"></dc-import>

  <!-- HEADER -->
  <section style="background:#0e1f42;color:#fff;">
    <div style="max-width:820px;margin:0 auto;padding:clamp(40px,6vw,64px) clamp(20px,4vw,40px);">
      <div style="font-size:12.5px;color:#9fb0d0;margin-bottom:22px;"><a href="Mikroloty AP.dc.html" style="color:#9fb0d0;">Home</a> &nbsp;/&nbsp; <a href="Aktualnosci.dc.html" style="color:#9fb0d0;">Aktualności</a> &nbsp;/&nbsp; <span style="color:#fff;">Wpis</span></div>
      <span style="display:inline-block;font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#0e1f42;background:#f3c200;padding:5px 11px;margin-bottom:18px;">{{ tag }}</span>
      <h1 style="font-family:'Archivo',sans-serif;font-weight:800;font-size:clamp(28px,4.4vw,44px);line-height:1.12;letter-spacing:-0.01em;margin:0 0 20px;">{{ title }}</h1>
      <div style="display:flex;flex-wrap:wrap;gap:8px 22px;font-size:13.5px;color:#aab6d2;">
        <span>{{ date }}</span><span>·</span><span>{{ author }}</span><span>·</span><span>{{ readTime }}</span>
      </div>
    </div>
  </section>

  <!-- LEAD IMAGE -->
  <div style="background:#0e1f42;">
    <div style="max-width:1040px;margin:0 auto;padding:0 clamp(20px,4vw,40px);">
      <img src="{{ leadImg }}" alt="{{ title }}" style="width:100%;aspect-ratio:16/8;object-fit:cover;display:block;transform:translateY(clamp(-28px,-4vw,-40px));" />
    </div>
  </div>

  <!-- BODY -->
  <section style="padding:clamp(20px,3vw,32px) 0 clamp(52px,7vw,80px);background:#fff;">
    <div style="max-width:720px;margin:0 auto;padding:0 clamp(20px,4vw,40px);">
      <p style="font-size:19px;line-height:1.6;color:#0e1f42;font-weight:500;margin:0 0 28px;">{{ lead }}</p>
      <div class="article-body" style="font-size:16.5px;line-height:1.75;color:#33405c;">{{ body }}</div>

      <!-- share / back -->
      <div style="display:flex;flex-wrap:wrap;gap:16px;align-items:center;justify-content:space-between;margin-top:44px;padding-top:26px;border-top:1px solid #dfe3ea;">
        <a href="Aktualnosci.dc.html" style="font-weight:700;font-size:13px;letter-spacing:.04em;text-transform:uppercase;color:#0e1f42;">← Wróć do aktualności</a>
        <div style="display:flex;gap:10px;align-items:center;">
          <span style="font-size:13px;color:#8792a8;">Udostępnij:</span>
          <sc-for list="{{ shares }}" as="s" hint-placeholder-count="3">
            <a href="#" style="width:36px;height:36px;border:1px solid #cfd6e2;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#0e1f42;" style-hover="border-color:#0e1f42;">{{ s }}</a>
          </sc-for>
        </div>
      </div>
    </div>
  </section>

  <!-- RELATED -->
  <section style="padding:clamp(48px,6vw,72px) 0;background:#f3f4f6;">
    <div style="max-width:1240px;margin:0 auto;padding:0 clamp(20px,4vw,40px);">
      <div style="border-bottom:2px solid #0e1f42;padding-bottom:18px;margin-bottom:34px;">
        <h2 style="font-family:'Archivo',sans-serif;font-weight:800;font-size:clamp(22px,3vw,30px);margin:0;color:#0e1f42;">Powiązane aktualności</h2>
      </div>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:26px;">
        <sc-for list="{{ related }}" as="n" hint-placeholder-count="3">
          <a href="Aktualnosc-wpis.dc.html" style="background:#fff;border:1px solid #dfe3ea;overflow:hidden;display:flex;flex-direction:column;transition:border-color .18s;" style-hover="border-color:#0e1f42;">
            <div style="position:relative;aspect-ratio:16/10;background:#e6e9ef;overflow:hidden;">
              <img src="{{ n.img }}" alt="{{ n.title }}" style="width:100%;height:100%;object-fit:cover;display:block;" />
              <span style="position:absolute;left:0;bottom:0;background:#0e1f42;color:#fff;font-size:12px;font-weight:600;padding:6px 12px;">{{ n.date }}</span>
            </div>
            <div style="padding:20px 22px 22px;">
              <span style="font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#b58a00;">{{ n.tag }}</span>
              <h3 style="font-family:'Archivo',sans-serif;font-weight:700;font-size:17.5px;line-height:1.3;margin:8px 0 0;color:#1a2233;">{{ n.title }}</h3>
            </div>
          </a>
        </sc-for>
      </div>
    </div>
  </section>

  <dc-import name="MikrolotyFooter" hint-size="100%,360px"></dc-import>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  renderVals() {
    const p = (t) => React.createElement('p', null, t);
    const h = (t) => React.createElement('h2', null, t);
    const body = React.createElement(React.Fragment, null,
      p('Komisja Mikrolotowa Aeroklubu Polskiego ogłosiła skład kadry narodowej na sezon 2026. Reprezentacja została wyłoniona na podstawie wyników ubiegłorocznych zawodów rangi mistrzowskiej oraz punktacji rankingu krajowego.'),
      p('Do kadry A w klasie ULM powołano sześciu zawodników, natomiast w klasie paralotniowej — pięciu. Skład uzupełnia sztab szkoleniowy pod kierunkiem trenera kadry.'),
      h('Przygotowania do sezonu międzynarodowego'),
      p('Zawodnicy rozpoczną wspólne treningi już w maju. W planie są zgrupowania z nawigacji oraz precyzji lądowania, a także starty kontrolne w zawodach krajowych.'),
      React.createElement('ul', null,
        React.createElement('li', null, 'Zgrupowanie nawigacyjne — maj 2026'),
        React.createElement('li', null, 'Starty kontrolne w zawodach regionalnych — czerwiec 2026'),
        React.createElement('li', null, 'Mistrzostwa świata FAI — sierpień 2026'),
      ),
      p('Pełną listę powołanych zawodników oraz kalendarz startów można znaleźć w zakładce Kadra oraz Zawody.'),
    );
    return {
      tag: 'Kadra narodowa',
      title: 'Kadra narodowa mikrolotów powołana na sezon 2026',
      date: '28 czerwca 2026',
      author: 'Redakcja mikroloty.com',
      readTime: '3 min czytania',
      leadImg: 'images/trophy.jpg',
      lead: 'Komisja ogłosiła skład reprezentacji w klasach ULM i paralotniowej na nadchodzący sezon międzynarodowy. Poznaj nazwiska zawodników, którzy powalczą o medale mistrzostw świata FAI.',
      body,
      shares: ['FB', 'X', 'in'],
      related: [
        { date: '20.06.2026', tag: 'Przepisy', title: 'Nowe przepisy sportowe FAI dla klasy mikrolotowej', img: 'images/nav-map.jpg' },
        { date: '12.06.2026', tag: 'Relacja', title: 'Relacja z Mistrzostw Europy w Mikrolotach', img: 'images/gyro-yellow.jpg' },
        { date: '04.06.2026', tag: 'Zawody', title: 'Rusza sezon — pierwsze zawody regionalne za nami', img: 'images/aeroprakt-grass.jpg' },
      ],
    };
  }
}
</script>
</body>
</html>
